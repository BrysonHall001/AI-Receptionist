<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Create your account</title>
  <style>
    :root { --ink:#1a2230; --ink-soft:#5b6678; --border:#e3e8ef; --bg:#f5f7fa; --accent:#3257d6; --danger:#c0392b; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--ink); }
    .wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { width:100%; max-width:420px; background:#fff; border:1px solid var(--border); border-radius:14px; padding:28px; box-shadow:0 8px 30px rgba(20,30,50,.06); }
    h1 { font-size:20px; margin:0 0 4px; }
    .sub { color:var(--ink-soft); font-size:14px; margin:0 0 20px; line-height:1.5; }
    label { display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft); margin:14px 0 5px; text-transform:uppercase; letter-spacing:.03em; }
    input { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:9px; font-size:15px; }
    input[readonly] { background:#f2f4f8; color:var(--ink-soft); }
    button { width:100%; margin-top:18px; padding:11px; border:0; border-radius:9px; background:var(--accent); color:#fff; font-size:15px; font-weight:600; cursor:pointer; }
    button:disabled { opacity:.55; cursor:default; }
    .msg { margin-top:14px; font-size:14px; line-height:1.5; }
    .msg.err { color:var(--danger); }
    .hint { color:var(--ink-soft); font-size:12.5px; margin-top:6px; }
    .center { text-align:center; }
    a { color:var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="card">
      <div class="center" id="loading"><p class="sub">Checking your invite…</p></div>
    </div>
  </div>

  <script>
    (function () {
      var card = document.getElementById("card");
      var token = new URLSearchParams(window.location.search).get("token") || "";

      function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) { return ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" })[c]; }); }
      function invalid(message) {
        card.innerHTML =
          '<h1>This link can\u2019t be used</h1>' +
          '<p class="sub">' + esc(message || "This invite link is invalid or has expired.") + '</p>' +
          '<p class="sub">Ask whoever invited you to send a fresh link.</p>';
      }

      if (!token) { invalid("This invite link is missing its token."); return; }

      // Step 1: validate the token. Role/tenant/email all come from the server here —
      // the page never chooses them.
      fetch("/invites/" + encodeURIComponent(token), { headers: { "Accept": "application/json" } })
        .then(function (r) { return r.ok ? r.json() : r.json().then(function (e) { throw new Error((e && e.error) || "invalid"); }); })
        .then(function (data) { renderForm(data); })
        .catch(function (e) { invalid(e.message); });

      function renderForm(data) {
        card.innerHTML =
          '<h1>Create your account</h1>' +
          '<p class="sub">You\u2019ve been invited to <strong>' + esc(data.portalName) + '</strong>. Confirm your email and choose a password to finish.</p>' +
          '<label>Email</label>' +
          '<input id="email" type="email" value="' + esc(data.email) + '" readonly />' +
          '<label>Password</label>' +
          '<input id="pw" type="password" autocomplete="new-password" placeholder="At least 10 characters" />' +
          '<div class="hint">Use at least 10 characters, mixing at least two of: lowercase, uppercase, numbers, or symbols.</div>' +
          '<label>Confirm password</label>' +
          '<input id="pw2" type="password" autocomplete="new-password" placeholder="Re-enter your password" />' +
          '<div class="hint">Your role and workspace were set by your invite.</div>' +
          '<button id="go">Create account</button>' +
          '<div class="msg" id="msg"></div>';

        var go = document.getElementById("go");
        var msg = document.getElementById("msg");
        function show(text, isErr) { msg.textContent = text; msg.className = "msg" + (isErr ? " err" : ""); }

        go.onclick = function () {
          var pw = document.getElementById("pw").value;
          var pw2 = document.getElementById("pw2").value;
          if (pw.length < 10) { show("Password must be at least 10 characters and mix at least two of: lowercase, uppercase, numbers, or symbols.", true); return; }
          if (pw !== pw2) { show("Those passwords don\u2019t match.", true); return; }
          go.disabled = true; show("Creating your account\u2026", false);
          // Step 2: accept. We send ONLY the password — role/tenant/email come from
          // the stored invite on the server.
          fetch("/invites/" + encodeURIComponent(token) + "/accept", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password: pw })
          })
            .then(function (r) { return r.json().then(function (b) { return { ok: r.ok, b: b }; }); })
            .then(function (res) {
              if (res.ok) { show("Account created \u2014 taking you in\u2026", false); window.location.href = "/"; }
              else { go.disabled = false; show((res.b && res.b.error) || "Something went wrong.", true); }
            })
            .catch(function () { go.disabled = false; show("Network error. Please try again.", true); });
        };
      }
    })();
  </script>
</body>
</html>
